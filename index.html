<!DOCTYPE html>  
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>27 ТВ каналов от Ростелеком</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0f15;
            padding: 20px;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1600px;
            height: 95vh;
            gap: 20px;
            background: rgba(10, 15, 25, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(70, 130, 200, 0.2);
            overflow: hidden;
        }

        .player-section {
            flex: 1.5 1 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .player-container {
            background: #000000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px black, 0 0 0 1px #2e3a48;
            width: 100%;
            height: 100%;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000000 !important;
            outline: none;
            object-fit: contain;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }

        .player-container:hover .custom-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7fff00;
            cursor: pointer;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
            z-index: 10;
            transition: opacity 0.3s;
            display: none;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #7fff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .channels-section {
            flex: 1 1 0;
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            box-shadow: inset 0 0 0 1px rgba(50, 80, 120, 0.5), 0 10px 20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 0;
        }

        .channels-list {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 15px;
            width: 100%;
            margin: 0 auto;
        }

        .channel-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            line-height: 1.4;
            padding: 8px 4px;
            min-width: 0;
            width: 100%;
            border-radius: 12px;
        }

        .channel-card.active {
            background: rgba(127, 255, 0, 0.2);
            box-shadow: 0 0 0 2px #7fff00;
        }

        .channel-card:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 12px #7fff00);
        }

        .channel-card:active {
            transform: scale(0.98);
        }

        .channel-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.7));
            background: transparent;
            border-radius: 16px;
        }

        .channel-name {
            font-size: 0.8rem;
            opacity: 0.95;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .logo-fallback {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a3f5e, #1a2a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #7fff00;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.7);
            border: 2px solid #3a5a7a;
        }

        .error-message {
            background: rgba(255,0,0,0.3);
            border: 1px solid rgba(255,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 80%;
        }

        @media (min-width: 1201px) {
            .channels-list { grid-template-columns: repeat(9, 1fr); gap: 15px; }
            .channel-logo, .logo-fallback { width: 70px; height: 70px; }
        }

        @media (max-width: 1200px) and (min-width: 769px) {
            .channels-list { grid-template-columns: repeat(6, 1fr); gap: 15px; }
            .channel-logo, .logo-fallback { width: 60px; height: 60px; }
            .channel-name { font-size: 0.75rem; }
        }

        @media (max-width: 768px) {
            .main-layout { padding: 12px; height: 98vh; gap: 12px; }
            .channels-section { padding: 15px 10px; }
            .channels-list { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .channel-card { padding: 5px 2px; }
            .channel-logo, .logo-fallback { width: 55px; height: 55px; margin-bottom: 4px; }
            .channel-name { font-size: 0.65rem; white-space: normal; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .control-btn { width: 32px; height: 32px; font-size: 16px; }
            .volume-slider { width: 60px; }
        }

        @media (max-width: 480px) {
            .channels-list { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .channel-logo, .logo-fallback { width: 45px; height: 45px; font-size: 20px; }
            .channel-name { font-size: 0.6rem; }
            .main-layout { padding: 8px; }
            .channels-section { padding: 10px 5px; }
        }

        @media (max-width: 320px) {
            .channels-list { grid-template-columns: repeat(2, 1fr); }
        }

        .player-container:-webkit-full-screen {
            border-radius: 0;
        }
        
        .player-container:fullscreen {
            border-radius: 0;
        }
        
        .player-container:-webkit-full-screen video {
            object-fit: contain;
        }
        
        .player-container:fullscreen video {
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="player-section">
            <div class="player-container" id="playerContainer">
                <video id="videoPlayer" playsinline></video>
                <div class="custom-controls">
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100">
                    <button class="control-btn" id="fullscreenBtn">⛶</button>
                </div>
                <div id="loadingIndicator" class="loading-overlay">
                    <div class="spinner"></div>
                    <span>Загрузка канала...</span>
                </div>
            </div>
        </div>

        <div class="channels-section">
            <div class="channels-list" id="channelsList"></div>
        </div>
    </div>

    <script>
        (function() {
            // Функция для конвертации HTTP URL в HTTPS (если возможно)
            function fixUrl(url) {
                // Если страница открыта по HTTPS, пробуем конвертировать HTTP в HTTPS
                if (window.location.protocol === 'https:' && url.startsWith('http://')) {
                    // Пробуем заменить на https
                    const httpsUrl = url.replace('http://', 'https://');
                    console.log(`Конвертируем URL: ${url} -> ${httpsUrl}`);
                    return httpsUrl;
                }
                return url;
            }

            const channelsDataRaw = [
                { name: "Первый канал",   url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_1TVSD/video_800x450_avc1/variant.m3u8", logo: "icons/146.png" },
                { name: "Россия 1",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_RUSSIA1/video_800x450_avc1/variant.m3u8", logo: "icons/711.png" },
                { name: "НТВ",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_NTV/video_800x450_avc1/variant.m3u8", logo: "icons/162.png" },
                { name: "Россия 24",      url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_RUSSIA24/video_800x450_avc1/variant.m3u8", logo: "icons/1683.png" },
                { name: "ТНТ",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_TNT/video_800x450_avc1/variant.m3u8", logo: "icons/353.png" },
                { name: "Матч! ТВ",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_MATCHTV/video_800x450_avc1/variant.m3u8", logo: "icons/2051.png" },
                { name: "Рен ТВ",         url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_RENTV/video_800x450_avc1/variant.m3u8", logo: "icons/18.png" },
                { name: "СТС",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_STS/video_800x450_avc1/variant.m3u8", logo: "icons/79.png" },
                { name: "ТВ-3",           url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_TV3/video_800x450_avc1/variant.m3u8", logo: "icons/698.png" },
                { name: "Пятница!",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_PYATNIZZA/video_800x450_avc1/variant.m3u8", logo: "icons/1003.png" },
                { name: "Муз ТВ",         url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_MUZTV/video_800x450_avc1/variant.m3u8", logo: "icons/897.png" },
                { name: "Домашний",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_DOMASHNIY/video_800x450_avc1/variant.m3u8", logo: "icons/304.png" },
                { name: "Че!",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_PERETZ/video_800x450_avc1/variant.m3u8", logo: "icons/1598.png" },
                { name: "Ю",              url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_U/video_800x450_avc1/variant.m3u8", logo: "icons/898.png" },
                { name: "Суббота!",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_SUPER/video_800x450_avc1/variant.m3u8", logo: "icons/2288.png" },
                { name: "ТНТ-4",          url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_TNT4/video_800x450_avc1/variant.m3u8", logo: "icons/1649.png" },
                { name: "Звезда",         url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_ZVEZDA/video_800x450_avc1/variant.m3u8", logo: "icons/405.png" },
                { name: "Пятый канал",    url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_5TV/video_800x450_avc1/variant.m3u8", logo: "icons/427.png" },
                { name: "СТС Love",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_STSLOVE/video_800x450_avc1/variant.m3u8", logo: "icons/1322.png" },
                { name: "ОТР",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_OTR/video_800x450_avc1/variant.m3u8", logo: "icons/1000.png" },
                { name: "ТВЦ",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_TVC/video_800x450_avc1/variant.m3u8", logo: "icons/649.png" },
                { name: "Мир",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_MIR/video_800x450_avc1/variant.m3u8", logo: "icons/726.png" },
                { name: "Карусель",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_KARUSEL/video_800x450_avc1/variant.m3u8", logo: "icons/740.png" },
                { name: "2x2",            url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_2X2/video_800x450_avc1/variant.m3u8", logo: "icons/323.png" },
                { name: "Солнце",         url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_DISNEY/video_800x450_avc1/variant.m3u8", logo: "icons/7669.png" },
                { name: "Россия К",       url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_RUSSIAK/video_800x450_avc1/variant.m3u8", logo: "icons/187.png" },
                { name: "Спас",           url: "http://zabava-htlive.cdn.ngenix.net/hls/CH_SPAS/video_800x450_avc1/variant.m3u8", logo: "icons/2141.png" }
            ];

            // Конвертируем URL в зависимости от протокола страницы
            const channelsData = channelsDataRaw.map(ch => ({
                ...ch,
                url: fixUrl(ch.url)
            }));

            const video = document.getElementById('videoPlayer');
            const playerContainer = document.getElementById('playerContainer');
            const channelsList = document.getElementById('channelsList');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const volumeSlider = document.getElementById('volumeSlider');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            let hlsInstance = null;
            let currentChannel = null;

            // Настройка звука на 100% при загрузке
            video.volume = 1.0;
            volumeSlider.value = 100;

            // Регулятор громкости
            volumeSlider.addEventListener('input', (e) => {
                const val = e.target.value / 100;
                video.volume = val;
                video.muted = false;
            });

            // Полноэкранный режим
            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    playerContainer.requestFullscreen().catch(err => {
                        console.warn(`Ошибка fullscreen: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            }

            fullscreenBtn.addEventListener('click', toggleFullscreen);

            function showLoading(show, errorMsg = null) {
                if (errorMsg) {
                    loadingIndicator.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
                            <div style="margin-bottom: 10px;">${errorMsg}</div>
                            <div style="font-size: 12px; opacity: 0.7;">Попробуйте выбрать другой канал</div>
                        </div>
                    `;
                    loadingIndicator.style.display = 'flex';
                } else {
                    loadingIndicator.innerHTML = `
                        <div class="spinner"></div>
                        <span>Загрузка канала...</span>
                    `;
                    loadingIndicator.style.display = show ? 'flex' : 'none';
                }
            }

            function destroyHls() {
                if (hlsInstance) {
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
            }

            function setActiveChannel(channelName) {
                document.querySelectorAll('.channel-card').forEach(card => {
                    if (card.querySelector('.channel-name')?.textContent === channelName) {
                        card.classList.add('active');
                    } else {
                        card.classList.remove('active');
                    }
                });
            }

            async function playChannel(channel) {
                if (currentChannel === channel.name && !video.paused) {
                    console.log('Канал уже активен');
                    return;
                }
                
                currentChannel = channel.name;
                setActiveChannel(channel.name);
                showLoading(true);
                
                const streamUrl = channel.url;
                console.log(`Загружаем канал: ${channel.name} | URL: ${streamUrl}`);
                
                try {
                    destroyHls();
                    
                    if (Hls.isSupported()) {
                        hlsInstance = new Hls({ 
                            maxBufferLength: 30, 
                            enableWorker: true,
                            autoStartLoad: true
                        });
                        
                        hlsInstance.loadSource(streamUrl);
                        hlsInstance.attachMedia(video);
                        
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => reject(new Error('Таймаут загрузки')), 20000);
                            
                            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                                clearTimeout(timeout);
                                resolve();
                            });
                            
                            hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                                console.error('HLS Error:', data);
                                if (data.fatal) {
                                    clearTimeout(timeout);
                                    reject(new Error(data.details || 'Ошибка HLS'));
                                }
                            });
                        });
                        
                        video.muted = false;
                        await video.play();
                        console.log('Воспроизведение успешно запущено');
                        
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = streamUrl;
                        video.load();
                        video.muted = false;
                        await video.play();
                    } else {
                        throw new Error('HLS не поддерживается браузером');
                    }
                    
                } catch (err) {
                    console.error('Ошибка:', err);
                    let errorMessage = 'Не удалось загрузить канал. ';
                    
                    if (err.message.includes('Mixed Content') || streamUrl.includes('http://') && window.location.protocol === 'https:') {
                        errorMessage = 'Проблема: HTTPS страница пытается загрузить HTTP видео.\n\nРешение: Откройте страницу по адресу http:// (без буквы s) или используйте другой хостинг.';
                        alert(errorMessage);
                    } else {
                        errorMessage += 'Проверьте интернет соединение.';
                        alert(`Ошибка: ${err.message}\n\n${errorMessage}`);
                    }
                    
                    showLoading(false);
                } finally {
                    setTimeout(() => showLoading(false), 1000);
                }
            }

            function renderChannels() {
                channelsList.innerHTML = '';
                channelsData.forEach((ch) => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';

                    const img = document.createElement('img');
                    img.className = 'channel-logo';
                    img.src = ch.logo;
                    img.alt = ch.name;
                    img.loading = 'lazy';
                    
                    img.onerror = function() {
                        this.style.display = 'none';
                        const fallback = document.createElement('div');
                        fallback.className = 'logo-fallback';
                        fallback.textContent = ch.name.charAt(0);
                        this.parentNode.insertBefore(fallback, this);
                    };

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'channel-name';
                    nameSpan.textContent = ch.name;

                    card.appendChild(img);
                    card.appendChild(nameSpan);
                    card.addEventListener('click', () => playChannel(ch));
                    channelsList.appendChild(card);
                });
            }

            renderChannels();

            // Выводим предупреждение если страница на HTTPS
            if (window.location.protocol === 'https:') {
                console.warn('ВНИМАНИЕ: Страница открыта по HTTPS, но видео потоки используют HTTP. Это может не работать из-за mixed content policy.');
                console.warn('Рекомендуется открыть страницу по адресу http://' + window.location.host);
            }
        })();
    </script>
</body>
</html>
